<!DOCTYPE html>
<html lang="en" id="top">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart | JFF Footwear</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="amazon-page">
  <div id="jff-header" data-active="cart"></div>

  <main class="page-main">
    <div class="container">
      <h1 class="page-title">Shopping Cart</h1>
      <div class="cart-layout">
        <div id="cart-items" class="cart-items"></div>
        <aside class="cart-summary amazon-cart-summary" id="cart-summary">
          <h2>Subtotal</h2>
          <div class="summary-row"><span>Items (<span id="summary-items">0</span>)</span><span id="summary-subtotal">₹ 0</span></div>
          <div class="summary-row"><span>Delivery</span><span id="summary-delivery">FREE</span></div>
          <div class="summary-row total"><span>Order Total</span><span id="summary-total">₹ 0</span></div>
          <a href="checkout.html" id="checkout-btn" class="btn btn-amazon btn-block">Proceed to Buy</a>
          <a href="index.html" class="btn btn-outline btn-block">Continue Shopping</a>
        </aside>
      </div>
    </div>
  </main>

  <div id="jff-footer"></div>

  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
