<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account | JFF Footwear</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="amazon-page">
  <div id="jff-header" data-active="orders"></div>

  <main class="page-main">
    <div class="container">
      <div id="order-success" class="alert success" hidden></div>
      <h1 class="page-title">Your Account</h1>
      <div class="account-grid">
        <section class="account-card">
          <h2>Profile</h2>
          <dl id="profile-info" class="profile-dl"></dl>
          <button type="button" id="logout-btn" class="btn btn-outline" style="margin-top:1rem">Sign Out</button>
        </section>
        <section class="account-card account-orders">
          <h2>My Orders</h2>
          <div id="orders-list"></div>
        </section>
      </div>
    </div>
  </main>

  <div id="jff-footer"></div>

  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/ui.js"></script>
  <script>
    if (!JFFAuth.requireAuth()) return;

    const user = JFFAuth.getCurrentUser();
    const profile = document.getElementById("profile-info");
    profile.innerHTML = `
      <dt>Name</dt><dd>${user.name}</dd>
      <dt>Email</dt><dd>${user.email}</dd>
      <dt>Phone</dt><dd>${user.phone}</dd>`;

    const orders = JFFAuth.getOrders(user.id);
    const ordersEl = document.getElementById("orders-list");

    const paymentLabel = (o) => {
      if (o.payment === "cod") return "Cash on Delivery";
      if (o.payment === "razorpay") return `Paid online${o.paymentId ? ` · ${o.paymentId}` : ""}`;
      return "UPI (WhatsApp)";
    };

    if (!orders.length) {
      ordersEl.innerHTML = `<p class="muted">No orders yet. <a href="index.html">Start shopping</a></p>`;
    } else {
      ordersEl.innerHTML = orders
        .map(
          (o) => `
          <article class="order-card">
            <div class="order-head">
              <strong>${o.id}</strong>
              <span>${new Date(o.createdAt).toLocaleDateString("en-IN")}</span>
            </div>
            <p>${o.items.length} item(s) · ${JFFStore.formatPrice(o.total)} · ${o.status}</p>
            <p class="muted">${o.address.city} · ${paymentLabel(o)}</p>
          </article>`
        )
        .join("");
    }

    const ordered = new URLSearchParams(window.location.search).get("ordered");
    if (ordered) {
      const alert = document.getElementById("order-success");
      alert.textContent = `Order ${ordered} placed successfully! We'll confirm on WhatsApp.`;
      alert.hidden = false;
    }

    document.getElementById("logout-btn").addEventListener("click", () => {
      JFFAuth.logout();
      window.dispatchEvent(new Event("jff-auth-updated"));
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
