<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | JFF Footwear</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner store-header">
      <a href="index.html" class="logo">JFF <em>Footwear</em></a>
      <a href="cart.html" class="header-link">← Back to cart</a>
    </div>
  </header>

  <main class="page-main">
    <div class="container checkout-layout">
      <section class="checkout-form-wrap">
        <h1 class="page-title">Checkout</h1>
        <form id="checkout-form" class="checkout-form">
          <h2>Delivery address</h2>
          <label>Full name<input type="text" name="name" required /></label>
          <label>Phone<input type="tel" name="phone" required pattern="[0-9]{10}" /></label>
          <label>Address<textarea name="address" rows="3" required placeholder="House no, street, area"></textarea></label>
          <label>City<input type="text" name="city" required /></label>
          <label>Pincode<input type="text" name="pincode" required pattern="[0-9]{6}" /></label>
          <label>Payment method
            <select name="payment" required>
              <option value="cod">Cash on Delivery</option>
              <option value="upi">UPI (pay on WhatsApp)</option>
            </select>
          </label>
          <p id="checkout-error" class="form-error" hidden></p>
          <button type="submit" class="btn btn-block btn-dark">Place Order</button>
        </form>
      </section>
      <aside class="cart-summary" id="order-summary">
        <h2>Order Summary</h2>
        <div id="summary-list"></div>
        <div class="summary-row total"><span>Total</span><span id="summary-total">₹ 0</span></div>
      </aside>
    </div>
  </main>

  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
