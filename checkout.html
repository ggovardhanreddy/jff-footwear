<!DOCTYPE html>
<html lang="en" id="top">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var p = location.pathname || "";
      var gh = location.hostname.indexOf("github.io") !== -1;
      window.JFF_BASE = gh || p.indexOf("/jff-footwear") !== -1 ? "/jff-footwear/" : "./";
      var b = document.createElement("base");
      b.href = window.JFF_BASE;
      document.head.appendChild(b);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | JFF Footwear</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="amazon-page">
  <div id="jff-header" data-active=""></div>

  <main class="page-main">
    <div class="container checkout-layout">
      <section class="checkout-form-wrap">
        <h1 class="page-title">Checkout</h1>
        <form id="checkout-form" class="checkout-form">
          <h2>1. Delivery address</h2>
          <label>Full name<input type="text" name="name" required /></label>
          <label>Phone<input type="tel" name="phone" required pattern="[0-9]{10}" /></label>
          <label>Address<textarea name="address" rows="3" required placeholder="House no, street, area"></textarea></label>
          <label>City<input type="text" name="city" required /></label>
          <label>Pincode<input type="text" name="pincode" required pattern="[0-9]{6}" /></label>
          <h2>2. Payment method</h2>
          <label>Payment
            <select name="payment" required>
              <option value="cod">Cash on Delivery</option>
              <option value="razorpay">Pay online — UPI, Card, Net Banking</option>
              <option value="upi">UPI (pay on WhatsApp)</option>
            </select>
          </label>
          <p id="payment-hint" class="auth-hint" hidden></p>
          <p id="checkout-error" class="form-error" hidden></p>
          <button type="submit" class="btn btn-amazon btn-block">Place your order</button>
        </form>
      </section>
      <aside class="cart-summary amazon-cart-summary" id="order-summary">
        <h2>Order Summary</h2>
        <div id="summary-list"></div>
        <div class="summary-row total"><span>Total</span><span id="summary-total">₹ 0</span></div>
      </aside>
    </div>
  </main>

  <div id="jff-footer"></div>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/razorpay-pay.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
