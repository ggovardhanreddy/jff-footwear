name: CI

# Pull requests and develop branch — quality gates only (no deploy)

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "project-docs/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "project-docs/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
