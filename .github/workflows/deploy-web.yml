# Superseded by deploy-main.yml for pushes to main.
# Use workflow_dispatch for manual web-only deploys.

name: Deploy Website

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      - name: Float packages to newest versions within package.json ranges
        run: npm update

      - name: Build web app
        run: npm run build --workspace=@jff/web
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.VERCEL_SITE_URL || 'https://jfffootwear.com' }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: "--prod"
