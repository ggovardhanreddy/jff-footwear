<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | JFF Footwear</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <header class="header">
    <div class="header-inner store-header">
      <a href="index.html" class="logo">JFF <em>Footwear</em></a>
      <a href="signup.html" class="btn btn-sm">Create account</a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Login</h1>
      <p class="auth-sub">Welcome back. Sign in to shop slippers &amp; track orders.</p>

      <div class="auth-tabs" role="tablist">
        <button type="button" class="auth-tab active" data-panel="panel-password">Password</button>
        <button type="button" class="auth-tab" data-panel="panel-otp">SMS OTP</button>
      </div>

      <p id="demo-otp-hint" class="auth-hint" hidden></p>
      <p id="login-error" class="form-error" hidden></p>

      <div id="panel-password" class="auth-panel">
        <form id="login-form" class="auth-form">
          <label>
            Email or phone
            <input type="text" name="email" required placeholder="you@email.com or 8106407372" autocomplete="username" />
          </label>
          <label>
            Password
            <input type="password" name="password" required minlength="6" autocomplete="current-password" />
          </label>
          <button type="submit" class="btn btn-block">Login</button>
        </form>
      </div>

      <div id="panel-otp" class="auth-panel" hidden>
        <form id="otp-form" class="auth-form">
          <label>
            Mobile number
            <input type="tel" id="otp-phone" required pattern="[0-9]{10}" placeholder="10-digit mobile" autocomplete="tel" />
          </label>
          <div id="recaptcha-wrap">
            <div id="recaptcha-container"></div>
          </div>
          <button type="button" id="send-otp-btn" class="btn btn-outline btn-block">Send OTP</button>
          <div id="otp-step-2" hidden>
            <label>
              Your name (optional)
              <input type="text" id="otp-name" placeholder="For new accounts" autocomplete="name" />
            </label>
            <label>
              Enter OTP
              <input type="text" id="otp-code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="6-digit code" autocomplete="one-time-code" />
            </label>
          </div>
          <button type="submit" id="verify-otp-btn" class="btn btn-block" hidden>Verify &amp; Login</button>
        </form>
      </div>

      <p class="auth-switch">New to JFF? <a href="signup.html">Create an account</a></p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/otp.js"></script>
  <script src="js/login-page.js"></script>
</body>
</html>
